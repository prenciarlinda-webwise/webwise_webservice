  <text x="100" y="178" fill="#25274d" font-size="11" font-weight="600">Accurate address or service area set</text>
  <circle cx="84" cy="198" r="9" fill="#22c55e" opacity="0.15"/><text x="84" y="202" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">✓</text>
