  <!-- Impact stat -->
  <rect x="60" y="470" width="680" height="66" rx="10" fill="#25274d"/>
  <text x="400" y="496" fill="white" font-size="16" font-weight="700" text-anchor="middle">A fully optimized GBP drives 5x more calls than an incomplete profile</text>
  <text x="400" y="518" fill="#94a3b8" font-size="12" text-anchor="middle">GBP signals account for 32% of local Map Pack ranking factors</text>

  <text x="770" y="568" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
