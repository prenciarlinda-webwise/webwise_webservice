<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8f9fa"/><stop offset="100%" stop-color="#e8edf2"/></linearGradient>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="800" height="520" fill="url(#bg)" rx="16"/>
  <rect x="0" y="0" width="800" height="56" fill="#25274d" rx="16"/><rect x="0" y="30" width="800" height="26" fill="#25274d"/>
  <text x="400" y="36" fill="white" font-size="18" font-weight="700" text-anchor="middle">Local SEO: UK vs USA — Key Differences That Matter</text>
  <rect x="40" y="76" width="720" height="420" rx="12" fill="white" filter="url(#sh)"/>

  <!-- Headers -->
  <rect x="60" y="96" width="130" height="36" rx="6" fill="#f9fafb"/>
  <text x="125" y="120" fill="#6b7280" font-size="12" font-weight="600" text-anchor="middle">Factor</text>
  <rect x="205" y="96" width="260" height="36" rx="6" fill="#1d4ed8"/>
  <text x="335" y="120" fill="white" font-size="13" font-weight="700" text-anchor="middle">🇺🇸 United States</text>
  <rect x="480" y="96" width="260" height="36" rx="6" fill="#dc2626"/>
  <text x="610" y="120" fill="white" font-size="13" font-weight="700" text-anchor="middle">🇬🇧 United Kingdom</text>

  <!-- Row 1: Search Engine -->
  <rect x="60" y="142" width="130" height="52" rx="4" fill="#f9fafb"/>
  <text x="125" y="170" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Search Engine</text>
  <text x="125" y="184" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Market</text>
  <rect x="205" y="142" width="260" height="52" rx="4" fill="#eff6ff"/>
  <text x="335" y="165" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Google: 87% market share</text>
  <text x="335" y="183" fill="#6b7280" font-size="10" text-anchor="middle">Bing growing (Copilot)</text>
  <rect x="480" y="142" width="260" height="52" rx="4" fill="#fef2f2"/>
  <text x="610" y="165" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Google: 93% market share</text>
  <text x="610" y="183" fill="#6b7280" font-size="10" text-anchor="middle">Even more Google-dependent</text>

  <!-- Row 2: Map Pack -->
  <rect x="60" y="202" width="130" height="52" rx="4" fill="#f9fafb"/>
  <text x="125" y="232" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Map Pack</text>
  <rect x="205" y="202" width="260" height="52" rx="4" fill="#eff6ff"/>
  <text x="335" y="225" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Larger service areas (cities)</text>
  <text x="335" y="243" fill="#6b7280" font-size="10" text-anchor="middle">More competitive in metro areas</text>
  <rect x="480" y="202" width="260" height="52" rx="4" fill="#fef2f2"/>
  <text x="610" y="225" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Tighter radius (towns/boroughs)</text>
  <text x="610" y="243" fill="#6b7280" font-size="10" text-anchor="middle">Postcode-level targeting matters</text>

  <!-- Row 3: Directories -->
  <rect x="60" y="262" width="130" height="52" rx="4" fill="#f9fafb"/>
  <text x="125" y="292" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Key Directories</text>
  <rect x="205" y="262" width="260" height="52" rx="4" fill="#eff6ff"/>
  <text x="335" y="285" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Yelp, BBB, Angi, HomeAdvisor</text>
  <text x="335" y="303" fill="#6b7280" font-size="10" text-anchor="middle">Industry-specific platforms</text>
  <rect x="480" y="262" width="260" height="52" rx="4" fill="#fef2f2"/>
  <text x="610" y="285" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Yell, Checkatrade, TrustATrader</text>
  <text x="610" y="303" fill="#6b7280" font-size="10" text-anchor="middle">Bark, MyBuilder, Trustpilot</text>

  <!-- Row 4: Reviews -->
  <rect x="60" y="322" width="130" height="52" rx="4" fill="#f9fafb"/>
  <text x="125" y="352" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Review Culture</text>
  <rect x="205" y="322" width="260" height="52" rx="4" fill="#eff6ff"/>
  <text x="335" y="345" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Aggressive review culture</text>
  <text x="335" y="363" fill="#6b7280" font-size="10" text-anchor="middle">100+ reviews expected for leaders</text>
  <rect x="480" y="322" width="260" height="52" rx="4" fill="#fef2f2"/>
  <text x="610" y="345" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Fewer reviews overall</text>
  <text x="610" y="363" fill="#6b7280" font-size="10" text-anchor="middle">30-50 reviews can dominate</text>

  <!-- Row 5: Pricing -->
  <rect x="60" y="382" width="130" height="52" rx="4" fill="#f9fafb"/>
  <text x="125" y="412" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">SEO Pricing</text>
  <rect x="205" y="382" width="260" height="52" rx="4" fill="#eff6ff"/>
  <text x="335" y="405" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">$500-$2,000/mo typical</text>
  <text x="335" y="423" fill="#6b7280" font-size="10" text-anchor="middle">Higher competition = higher cost</text>
  <rect x="480" y="382" width="260" height="52" rx="4" fill="#fef2f2"/>
  <text x="610" y="405" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">£400-£1,500/mo typical</text>
  <text x="610" y="423" fill="#6b7280" font-size="10" text-anchor="middle">Less competitive = better ROI</text>

  <!-- Bottom insight -->
  <rect x="60" y="446" width="680" height="34" rx="6" fill="#25274d"/>
  <text x="400" y="468" fill="white" font-size="12" font-weight="700" text-anchor="middle">Same fundamentals, different tactics — your strategy must match the local market</text>

  <text x="770" y="508" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
</svg>