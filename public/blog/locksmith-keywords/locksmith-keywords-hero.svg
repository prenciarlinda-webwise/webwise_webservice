<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25274d"/>
      <stop offset="50%" stop-color="#1a1c38"/>
      <stop offset="100%" stop-color="#13142b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ed7c21"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softSh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#heroBg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="100" y1="0" x2="100" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Accent glow circles -->
  <circle cx="950" cy="200" r="180" fill="#ed7c21" opacity="0.06" filter="url(#glow)"/>
  <circle cx="200" cy="450" r="150" fill="#ed7c21" opacity="0.04" filter="url(#glow)"/>

  <!-- Left side: Title content -->
  <text x="70" y="120" fill="white" font-size="16" font-weight="600" letter-spacing="3" opacity="0.6">KEYWORD RESEARCH GUIDE</text>

  <text x="70" y="185" fill="white" font-size="52" font-weight="800">Locksmith Keywords</text>
  <text x="70" y="245" fill="white" font-size="52" font-weight="800">for <tspan fill="#ed7c21">SEO</tspan></text>

  <text x="70" y="295" fill="white" font-size="20" opacity="0.7">100+ high-intent keywords that drive calls in 2026</text>

  <!-- Stat boxes -->
  <rect x="70" y="330" width="150" height="70" rx="10" fill="white" opacity="0.08"/>
  <text x="145" y="362" fill="#ed7c21" font-size="28" font-weight="800" text-anchor="middle">100+</text>
  <text x="145" y="385" fill="white" font-size="12" font-weight="500" text-anchor="middle" opacity="0.7">Keywords</text>

  <rect x="240" y="330" width="150" height="70" rx="10" fill="white" opacity="0.08"/>
  <text x="315" y="362" fill="#ed7c21" font-size="28" font-weight="800" text-anchor="middle">6</text>
  <text x="315" y="385" fill="white" font-size="12" font-weight="500" text-anchor="middle" opacity="0.7">Categories</text>

  <rect x="410" y="330" width="150" height="70" rx="10" fill="white" opacity="0.08"/>
  <text x="485" y="362" fill="#ed7c21" font-size="28" font-weight="800" text-anchor="middle">40%+</text>
  <text x="485" y="385" fill="white" font-size="12" font-weight="500" text-anchor="middle" opacity="0.7">Conversion Rate</text>

  <!-- Right side: Floating keyword cards -->
  <!-- Card 1 -->
  <g filter="url(#softSh)">
    <rect x="680" y="60" width="340" height="56" rx="10" fill="white"/>
    <circle cx="710" cy="88" r="16" fill="#22c55e" opacity="0.15"/>
    <text x="710" y="93" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">1</text>
    <text x="738" y="83" fill="#25274d" font-size="14" font-weight="700">locksmith near me</text>
    <text x="738" y="101" fill="#6b7280" font-size="11">450,000 monthly searches</text>
    <rect x="950" y="76" width="56" height="22" rx="11" fill="#fef3e8"/>
    <text x="978" y="91" fill="#ed7c21" font-size="10" font-weight="700" text-anchor="middle">HIGH</text>
  </g>

  <!-- Card 2 -->
  <g filter="url(#softSh)">
    <rect x="710" y="132" width="340" height="56" rx="10" fill="white"/>
    <circle cx="740" cy="160" r="16" fill="#22c55e" opacity="0.15"/>
    <text x="740" y="165" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">2</text>
    <text x="768" y="155" fill="#25274d" font-size="14" font-weight="700">emergency locksmith</text>
    <text x="768" y="173" fill="#6b7280" font-size="11">33,100 monthly searches</text>
    <rect x="980" y="148" width="56" height="22" rx="11" fill="#fef3e8"/>
    <text x="1008" y="163" fill="#ed7c21" font-size="10" font-weight="700" text-anchor="middle">HIGH</text>
  </g>

  <!-- Card 3 -->
  <g filter="url(#softSh)">
    <rect x="680" y="204" width="340" height="56" rx="10" fill="white"/>
    <circle cx="710" cy="232" r="16" fill="#3b82f6" opacity="0.15"/>
    <text x="710" y="237" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">3</text>
    <text x="738" y="227" fill="#25274d" font-size="14" font-weight="700">car key replacement</text>
    <text x="738" y="245" fill="#6b7280" font-size="11">33,100 monthly searches</text>
    <rect x="950" y="220" width="56" height="22" rx="11" fill="#e8f4fe"/>
    <text x="978" y="235" fill="#3b82f6" font-size="10" font-weight="700" text-anchor="middle">MED</text>
  </g>

  <!-- Card 4 -->
  <g filter="url(#softSh)">
    <rect x="710" y="276" width="340" height="56" rx="10" fill="white"/>
    <circle cx="740" cy="304" r="16" fill="#3b82f6" opacity="0.15"/>
    <text x="740" y="309" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">4</text>
    <text x="768" y="299" fill="#25274d" font-size="14" font-weight="700">locked out of house</text>
    <text x="768" y="317" fill="#6b7280" font-size="11">27,100 monthly searches</text>
    <rect x="980" y="292" width="56" height="22" rx="11" fill="#e8f4fe"/>
    <text x="1008" y="307" fill="#3b82f6" font-size="10" font-weight="700" text-anchor="middle">MED</text>
  </g>

  <!-- Card 5 -->
  <g filter="url(#softSh)">
    <rect x="680" y="348" width="340" height="56" rx="10" fill="white"/>
    <circle cx="710" cy="376" r="16" fill="#10b981" opacity="0.15"/>
    <text x="710" y="381" fill="#10b981" font-size="14" font-weight="700" text-anchor="middle">5</text>
    <text x="738" y="371" fill="#25274d" font-size="14" font-weight="700">lock rekey service</text>
    <text x="738" y="389" fill="#6b7280" font-size="11">14,800 monthly searches</text>
    <rect x="950" y="364" width="56" height="22" rx="11" fill="#ecfdf5"/>
    <text x="978" y="379" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">LOW</text>
  </g>

  <!-- Card 6 (faded) -->
  <g opacity="0.5" filter="url(#softSh)">
    <rect x="710" y="420" width="340" height="56" rx="10" fill="white"/>
    <circle cx="740" cy="448" r="16" fill="#10b981" opacity="0.15"/>
    <text x="740" y="453" fill="#10b981" font-size="14" font-weight="700" text-anchor="middle">6</text>
    <text x="768" y="443" fill="#25274d" font-size="14" font-weight="700">smart lock installation</text>
    <text x="768" y="461" fill="#6b7280" font-size="11">6,600 monthly searches</text>
    <rect x="980" y="436" width="56" height="22" rx="11" fill="#ecfdf5"/>
    <text x="1008" y="451" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">LOW</text>
  </g>

  <!-- More indicator -->
  <text x="880" y="504" fill="white" font-size="13" font-weight="600" text-anchor="middle" opacity="0.5">+ 94 more keywords inside...</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="black" opacity="0.2"/>
  <rect x="70" y="584" width="4" height="30" rx="2" fill="#ed7c21"/>
  <text x="86" y="604" fill="white" font-size="15" font-weight="700" opacity="0.9">websiteandseoagency.com</text>
  <text x="1130" y="604" fill="white" font-size="13" font-weight="500" text-anchor="end" opacity="0.6">Updated March 2026</text>
</svg>