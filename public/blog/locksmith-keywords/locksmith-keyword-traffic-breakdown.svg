<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e8edf2"/>
    </linearGradient>
    <filter id="sh2" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <rect x="0" y="0" width="800" height="56" fill="#25274d" rx="16"/>
  <rect x="0" y="30" width="800" height="26" fill="#25274d"/>
  <text x="400" y="36" fill="white" font-size="18" font-weight="700" text-anchor="middle">Locksmith Keyword Traffic Breakdown by Category</text>

  <!-- Chart area -->
  <rect x="40" y="76" width="720" height="400" rx="12" fill="white" filter="url(#sh2)"/>

  <!-- Y-axis labels -->
  <text x="96" y="115" fill="#6b7280" font-size="10" text-anchor="end">500K</text>
  <text x="96" y="175" fill="#6b7280" font-size="10" text-anchor="end">400K</text>
  <text x="96" y="235" fill="#6b7280" font-size="10" text-anchor="end">300K</text>
  <text x="96" y="295" fill="#6b7280" font-size="10" text-anchor="end">200K</text>
  <text x="96" y="355" fill="#6b7280" font-size="10" text-anchor="end">100K</text>
  <text x="96" y="415" fill="#6b7280" font-size="10" text-anchor="end">0</text>

  <!-- Grid lines -->
  <line x1="105" y1="110" x2="730" y2="110" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="105" y1="170" x2="730" y2="170" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="105" y1="230" x2="730" y2="230" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="105" y1="290" x2="730" y2="290" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="105" y1="350" x2="730" y2="350" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="105" y1="410" x2="730" y2="410" stroke="#9ca3af" stroke-width="1"/>

  <!-- Bar 1: Emergency (tallest) -->
  <rect x="135" y="116" width="80" height="294" rx="4" fill="#ed7c21"/>
  <rect x="135" y="116" width="80" height="40" rx="4" fill="#d4690f" opacity="0.3"/>
  <text x="175" y="100" fill="#ed7c21" font-size="14" font-weight="700" text-anchor="middle">490K+</text>
  <text x="175" y="440" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Emergency</text>
  <text x="175" y="454" fill="#6b7280" font-size="9" text-anchor="middle">Lockout</text>

  <!-- Conversion badge for emergency -->
  <rect x="140" y="160" width="70" height="22" rx="11" fill="white" opacity="0.95"/>
  <text x="175" y="175" fill="#ed7c21" font-size="10" font-weight="700" text-anchor="middle">40%+ CVR</text>

  <!-- Bar 2: Automotive -->
  <rect x="255" y="230" width="80" height="180" rx="4" fill="#25274d"/>
  <text x="295" y="220" fill="#25274d" font-size="14" font-weight="700" text-anchor="middle">180K+</text>
  <text x="295" y="440" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Automotive</text>
  <text x="295" y="454" fill="#6b7280" font-size="9" text-anchor="middle">Keys &amp; Fobs</text>

  <!-- Avg ticket for automotive -->
  <rect x="260" y="270" width="70" height="22" rx="11" fill="white" opacity="0.9"/>
  <text x="295" y="285" fill="#25274d" font-size="10" font-weight="700" text-anchor="middle">$150-$400</text>

  <!-- Bar 3: Residential -->
  <rect x="375" y="280" width="80" height="130" rx="4" fill="#3b82f6"/>
  <text x="415" y="270" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">95K+</text>
  <text x="415" y="440" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Residential</text>
  <text x="415" y="454" fill="#6b7280" font-size="9" text-anchor="middle">Rekey &amp; Install</text>

  <!-- Bar 4: Commercial -->
  <rect x="495" y="330" width="80" height="80" rx="4" fill="#10b981"/>
  <text x="535" y="320" fill="#10b981" font-size="14" font-weight="700" text-anchor="middle">35K+</text>
  <text x="535" y="440" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Commercial</text>
  <text x="535" y="454" fill="#6b7280" font-size="9" text-anchor="middle">Access Control</text>

  <!-- Recurring badge for commercial -->
  <rect x="498" y="350" width="74" height="22" rx="11" fill="white" opacity="0.9"/>
  <text x="535" y="365" fill="#10b981" font-size="9" font-weight="700" text-anchor="middle">Recurring $$</text>

  <!-- Bar 5: Specialty/Smart -->
  <rect x="615" y="360" width="80" height="50" rx="4" fill="#8b5cf6"/>
  <text x="655" y="350" fill="#8b5cf6" font-size="14" font-weight="700" text-anchor="middle">20K+</text>
  <text x="655" y="440" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Smart Lock</text>
  <text x="655" y="454" fill="#6b7280" font-size="9" text-anchor="middle">&amp; Specialty</text>

  <!-- Low comp badge -->
  <rect x="618" y="370" width="74" height="22" rx="11" fill="white" opacity="0.9"/>
  <text x="655" y="385" fill="#8b5cf6" font-size="9" font-weight="700" text-anchor="middle">Low Comp.</text>

  <!-- Insight box -->
  <rect x="105" y="465" width="625" height="4" rx="2" fill="#ed7c21" opacity="0.3"/>

  <!-- Branding -->
  <text x="770" y="488" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
</svg>