  <rect x="430" y="458" width="320" height="30" rx="6" fill="#fef3e8"/>
  <text x="590" y="478" fill="#b45309" font-size="10" font-weight="600" text-anchor="middle">⚠ Emergency electrical searches spike 200% during storms and power outages</text>

  <text x="770" y="508" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
