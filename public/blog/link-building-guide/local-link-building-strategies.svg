<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8f9fa"/><stop offset="100%" stop-color="#e8edf2"/></linearGradient>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="800" height="520" fill="url(#bg)" rx="16"/>
  <rect x="0" y="0" width="800" height="56" fill="#25274d" rx="16"/><rect x="0" y="30" width="800" height="26" fill="#25274d"/>
  <text x="400" y="36" fill="white" font-size="18" font-weight="700" text-anchor="middle">Local Link Building: 6 Strategies Ranked by Impact &amp; Difficulty</text>
  <rect x="40" y="76" width="720" height="420" rx="12" fill="white" filter="url(#sh)"/>

  <!-- Headers -->
  <text x="70" y="106" fill="#6b7280" font-size="10" font-weight="600">Strategy</text>
  <text x="420" y="106" fill="#6b7280" font-size="10" font-weight="600">Impact</text>
  <text x="530" y="106" fill="#6b7280" font-size="10" font-weight="600">Difficulty</text>
  <text x="640" y="106" fill="#6b7280" font-size="10" font-weight="600">Time to Get</text>
  <line x1="60" y1="115" x2="740" y2="115" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Strategy 1 -->
  <rect x="60" y="122" width="680" height="52" rx="6" fill="#fff8f0"/>
  <circle cx="82" cy="148" r="14" fill="#ed7c21"/><text x="82" y="153" fill="white" font-size="12" font-weight="800" text-anchor="middle">1</text>
  <text x="104" y="142" fill="#25274d" font-size="12" font-weight="700">Local Sponsorships &amp; Charity</text>
  <text x="104" y="160" fill="#6b7280" font-size="10">Sponsor local teams, events, or nonprofits for .org/.edu backlinks</text>
  <rect x="420" y="138" width="80" height="20" rx="10" fill="#22c55e"/><text x="460" y="152" fill="white" font-size="10" font-weight="700" text-anchor="middle">Very High</text>
  <rect x="530" y="138" width="60" height="20" rx="10" fill="#10b981" opacity="0.2"/><text x="560" y="152" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">Easy</text>
  <text x="640" y="152" fill="#6b7280" font-size="11" font-weight="600">1-2 weeks</text>

  <!-- Strategy 2 -->
  <rect x="60" y="182" width="680" height="52" rx="6" fill="white"/>
  <circle cx="82" cy="208" r="14" fill="#3b82f6"/><text x="82" y="213" fill="white" font-size="12" font-weight="800" text-anchor="middle">2</text>
  <text x="104" y="202" fill="#25274d" font-size="12" font-weight="700">Local Business Directories</text>
  <text x="104" y="220" fill="#6b7280" font-size="10">Chamber of Commerce, BBB, industry associations</text>
  <rect x="420" y="198" width="60" height="20" rx="10" fill="#22c55e"/><text x="450" y="212" fill="white" font-size="10" font-weight="700" text-anchor="middle">High</text>
  <rect x="530" y="198" width="60" height="20" rx="10" fill="#10b981" opacity="0.2"/><text x="560" y="212" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">Easy</text>
  <text x="640" y="212" fill="#6b7280" font-size="11" font-weight="600">1-4 weeks</text>

  <!-- Strategy 3 -->
  <rect x="60" y="242" width="680" height="52" rx="6" fill="#f9fafb"/>
  <circle cx="82" cy="268" r="14" fill="#10b981"/><text x="82" y="273" fill="white" font-size="12" font-weight="800" text-anchor="middle">3</text>
  <text x="104" y="262" fill="#25274d" font-size="12" font-weight="700">Supplier &amp; Partner Links</text>
  <text x="104" y="280" fill="#6b7280" font-size="10">Get listed on vendor, manufacturer, or partner websites</text>
  <rect x="420" y="258" width="60" height="20" rx="10" fill="#22c55e"/><text x="450" y="272" fill="white" font-size="10" font-weight="700" text-anchor="middle">High</text>
  <rect x="530" y="258" width="80" height="20" rx="10" fill="#eab308" opacity="0.2"/><text x="570" y="272" fill="#b45309" font-size="10" font-weight="700" text-anchor="middle">Medium</text>
  <text x="640" y="272" fill="#6b7280" font-size="11" font-weight="600">2-4 weeks</text>

  <!-- Strategy 4 -->
  <rect x="60" y="302" width="680" height="52" rx="6" fill="white"/>
  <circle cx="82" cy="328" r="14" fill="#8b5cf6"/><text x="82" y="333" fill="white" font-size="12" font-weight="800" text-anchor="middle">4</text>
  <text x="104" y="322" fill="#25274d" font-size="12" font-weight="700">Local News &amp; PR</text>
  <text x="104" y="340" fill="#6b7280" font-size="10">Press releases, local newspaper features, community stories</text>
  <rect x="420" y="318" width="80" height="20" rx="10" fill="#22c55e"/><text x="460" y="332" fill="white" font-size="10" font-weight="700" text-anchor="middle">Very High</text>
  <rect x="530" y="318" width="80" height="20" rx="10" fill="#ef4444" opacity="0.15"/><text x="570" y="332" fill="#ef4444" font-size="10" font-weight="700" text-anchor="middle">Hard</text>
  <text x="640" y="332" fill="#6b7280" font-size="11" font-weight="600">2-8 weeks</text>

  <!-- Strategy 5 -->
  <rect x="60" y="362" width="680" height="52" rx="6" fill="#f9fafb"/>
  <circle cx="82" cy="388" r="14" fill="#eab308"/><text x="82" y="393" fill="white" font-size="12" font-weight="800" text-anchor="middle">5</text>
  <text x="104" y="382" fill="#25274d" font-size="12" font-weight="700">Guest Posts on Local Blogs</text>
  <text x="104" y="400" fill="#6b7280" font-size="10">Write helpful content for local bloggers, community sites, or niche blogs</text>
  <rect x="420" y="378" width="80" height="20" rx="10" fill="#eab308"/><text x="460" y="392" fill="white" font-size="10" font-weight="700" text-anchor="middle">Medium</text>
  <rect x="530" y="378" width="80" height="20" rx="10" fill="#eab308" opacity="0.2"/><text x="570" y="392" fill="#b45309" font-size="10" font-weight="700" text-anchor="middle">Medium</text>
  <text x="640" y="392" fill="#6b7280" font-size="11" font-weight="600">3-6 weeks</text>

  <!-- Strategy 6 -->
  <rect x="60" y="422" width="680" height="52" rx="6" fill="white"/>
  <circle cx="82" cy="448" r="14" fill="#6b7280"/><text x="82" y="453" fill="white" font-size="12" font-weight="800" text-anchor="middle">6</text>
  <text x="104" y="442" fill="#25274d" font-size="12" font-weight="700">Resource Page Link Building</text>
  <text x="104" y="460" fill="#6b7280" font-size="10">Get listed on "best local services" or resource pages in your area</text>
  <rect x="420" y="438" width="80" height="20" rx="10" fill="#eab308"/><text x="460" y="452" fill="white" font-size="10" font-weight="700" text-anchor="middle">Medium</text>
  <rect x="530" y="438" width="80" height="20" rx="10" fill="#ef4444" opacity="0.15"/><text x="570" y="452" fill="#ef4444" font-size="10" font-weight="700" text-anchor="middle">Hard</text>
  <text x="640" y="452" fill="#6b7280" font-size="11" font-weight="600">4-8 weeks</text>

  <text x="770" y="508" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
</svg>