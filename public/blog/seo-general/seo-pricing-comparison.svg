  <text x="540" y="314" fill="#25274d" font-size="10" font-weight="600">• Everything in Starter</text>
  <text x="540" y="329" fill="#25274d" font-size="10" font-weight="600">• Content creation</text>
  <text x="540" y="344" fill="#25274d" font-size="10" font-weight="600">• City pages + citations</text>
  <text x="540" y="359" fill="#25274d" font-size="10" font-weight="600">• Review generation</text>

