  <text x="255" y="414" fill="#25274d" font-size="20" font-weight="800" text-anchor="middle">$1,500 - $5K+</text>
  <text x="255" y="431" fill="#6b7280" font-size="10" text-anchor="middle">/month</text>

  <text x="350" y="408" fill="#25274d" font-size="11">Competitive markets,</text>
  <text x="350" y="424" fill="#25274d" font-size="11">multi-city targeting</text>

  <text x="540" y="404" fill="#6b7280" font-size="10">• Everything in Growth</text>
