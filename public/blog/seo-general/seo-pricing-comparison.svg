  <text x="400" y="481" fill="#b45309" font-size="10" font-weight="600" text-anchor="middle">💡 Avoid agencies charging under $300/month — you get what you pay for. Results require real investment.</text>

  <text x="770" y="508" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
