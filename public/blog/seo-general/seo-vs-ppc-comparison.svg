<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8f9fa"/><stop offset="100%" stop-color="#e8edf2"/></linearGradient>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="800" height="520" fill="url(#bg)" rx="16"/>
  <rect x="0" y="0" width="800" height="56" fill="#25274d" rx="16"/><rect x="0" y="30" width="800" height="26" fill="#25274d"/>
  <text x="400" y="36" fill="white" font-size="18" font-weight="700" text-anchor="middle">SEO vs PPC: Side-by-Side Comparison for Local Businesses</text>
  <rect x="40" y="76" width="720" height="420" rx="12" fill="white" filter="url(#sh)"/>

  <!-- Headers -->
  <rect x="60" y="96" width="100" height="36" rx="6" fill="#f9fafb"/>
  <text x="110" y="120" fill="#6b7280" font-size="12" font-weight="600" text-anchor="middle">Factor</text>
  <rect x="175" y="96" width="270" height="36" rx="6" fill="#ed7c21"/>
  <text x="310" y="120" fill="white" font-size="13" font-weight="700" text-anchor="middle">SEO (Organic)</text>
  <rect x="460" y="96" width="280" height="36" rx="6" fill="#3b82f6"/>
  <text x="600" y="120" fill="white" font-size="13" font-weight="700" text-anchor="middle">PPC (Google Ads)</text>

  <!-- Rows -->
  <!-- Cost -->
  <rect x="60" y="142" width="100" height="48" rx="4" fill="#f9fafb"/>
  <text x="110" y="170" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Cost</text>
  <rect x="175" y="142" width="270" height="48" rx="4" fill="#fff8f0"/>
  <text x="310" y="163" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">$500-$1,500/mo fixed</text>
  <text x="310" y="179" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">Cost per lead drops over time</text>
  <rect x="460" y="142" width="280" height="48" rx="4" fill="#f0f7ff"/>
  <text x="600" y="163" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">$5-$50+ per click</text>
  <text x="600" y="179" fill="#ef4444" font-size="10" font-weight="700" text-anchor="middle">Cost per lead stays same or rises</text>

  <!-- Timeline -->
  <rect x="60" y="198" width="100" height="48" rx="4" fill="#f9fafb"/>
  <text x="110" y="226" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Timeline</text>
  <rect x="175" y="198" width="270" height="48" rx="4" fill="#fff8f0"/>
  <text x="310" y="219" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">3-6 months to significant results</text>
  <text x="310" y="235" fill="#6b7280" font-size="10" text-anchor="middle">Compounds over time</text>
  <rect x="460" y="198" width="280" height="48" rx="4" fill="#f0f7ff"/>
  <text x="600" y="219" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Immediate traffic</text>
  <text x="600" y="235" fill="#6b7280" font-size="10" text-anchor="middle">Stops when you stop paying</text>

  <!-- Trust -->
  <rect x="60" y="254" width="100" height="48" rx="4" fill="#f9fafb"/>
  <text x="110" y="282" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Trust</text>
  <rect x="175" y="254" width="270" height="48" rx="4" fill="#fff8f0"/>
  <text x="310" y="275" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">70% of users skip ads</text>
  <text x="310" y="291" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">Organic = perceived authority</text>
  <rect x="460" y="254" width="280" height="48" rx="4" fill="#f0f7ff"/>
  <text x="600" y="275" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Labeled as "Sponsored"</text>
  <text x="600" y="291" fill="#6b7280" font-size="10" text-anchor="middle">Lower trust from searchers</text>

  <!-- ROI at 12mo -->
  <rect x="60" y="310" width="100" height="48" rx="4" fill="#f9fafb"/>
  <text x="110" y="332" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">12-Month</text>
  <text x="110" y="348" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">ROI</text>
  <rect x="175" y="310" width="270" height="48" rx="4" fill="#fff8f0"/>
  <text x="310" y="331" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">$12-$18 cost per lead</text>
  <text x="310" y="347" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">ROI increases every month</text>
  <rect x="460" y="310" width="280" height="48" rx="4" fill="#f0f7ff"/>
  <text x="600" y="331" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">$45-$75 cost per lead</text>
  <text x="600" y="347" fill="#ef4444" font-size="10" font-weight="700" text-anchor="middle">ROI stays flat or decreases</text>

  <!-- Long-term -->
  <rect x="60" y="366" width="100" height="48" rx="4" fill="#f9fafb"/>
  <text x="110" y="388" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Long-Term</text>
  <text x="110" y="404" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Value</text>
  <rect x="175" y="366" width="270" height="48" rx="4" fill="#fff8f0"/>
  <text x="310" y="387" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">You own the asset forever</text>
  <text x="310" y="403" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">Rankings persist after you stop paying</text>
  <rect x="460" y="366" width="280" height="48" rx="4" fill="#f0f7ff"/>
  <text x="600" y="387" fill="#25274d" font-size="11" font-weight="600" text-anchor="middle">Renting visibility</text>
  <text x="600" y="403" fill="#ef4444" font-size="10" font-weight="700" text-anchor="middle">Traffic goes to zero when ads stop</text>

  <!-- Verdict -->
  <rect x="60" y="426" width="680" height="50" rx="8" fill="#25274d"/>
  <text x="400" y="448" fill="white" font-size="13" font-weight="700" text-anchor="middle">Best strategy: SEO for long-term growth + PPC for immediate leads while SEO builds</text>
  <text x="400" y="466" fill="#94a3b8" font-size="11" text-anchor="middle">Most local businesses get the best ROI by investing 70% in SEO and 30% in PPC</text>

  <text x="770" y="508" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
</svg>