  <text x="400" y="450" fill="#b45309" font-size="13" font-weight="700" text-anchor="middle">The Map Pack captures 69.3% of all clicks for local service searches.</text>
  <text x="400" y="467" fill="#b45309" font-size="11" text-anchor="middle">Position #1 in the Map Pack gets 3.4x more clicks than the top organic result.</text>
  <text x="770" y="508" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
