    <filter id="sh3" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="800" height="520" fill="url(#bg3)" rx="16"/>
