  <text x="130" y="306" fill="#6b7280" font-size="12" font-weight="600" text-anchor="end">Organic #2</text>
  <rect x="140" y="292" width="92" height="22" rx="4" fill="#25274d" opacity="0.7"/>
  <text x="240" y="308" fill="#6b7280" font-size="12" font-weight="600">6.5%</text>
  <text x="130" y="338" fill="#6b7280" font-size="12" font-weight="600" text-anchor="end">Organic #3</text>
