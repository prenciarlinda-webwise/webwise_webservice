<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e8edf2"/>
    </linearGradient>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg)" rx="16"/>

  <rect x="0" y="0" width="800" height="56" fill="#25274d" rx="16"/>
  <rect x="0" y="30" width="800" height="26" fill="#25274d"/>
  <text x="400" y="36" fill="white" font-size="18" font-weight="700" text-anchor="middle">HVAC Search Demand: The Dual-Peak Seasonal Pattern</text>

  <rect x="40" y="76" width="720" height="380" rx="12" fill="white" filter="url(#sh)"/>

  <!-- Chart area -->
  <!-- X-axis months -->
  <text x="115" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Jan</text>
  <text x="168" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Feb</text>
  <text x="221" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Mar</text>
  <text x="274" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Apr</text>
  <text x="327" y="380" fill="#6b7280" font-size="9" text-anchor="middle">May</text>
  <text x="380" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Jun</text>
  <text x="433" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Jul</text>
  <text x="486" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Aug</text>
  <text x="539" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Sep</text>
  <text x="592" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Oct</text>
  <text x="645" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Nov</text>
  <text x="698" y="380" fill="#6b7280" font-size="9" text-anchor="middle">Dec</text>

  <!-- Baseline -->
  <line x1="90" y1="365" x2="720" y2="365" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Heating keywords area (winter peak) - blue -->
  <polygon points="115,230 168,260 221,295 274,330 327,340 380,350 433,355 486,355 539,345 592,310 645,250 698,230 698,365 115,365"
    fill="#3b82f6" opacity="0.12"/>
  <polyline points="115,230 168,260 221,295 274,330 327,340 380,350 433,355 486,355 539,345 592,310 645,250 698,230"
    fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cooling keywords area (summer peak) - orange/red -->
  <polygon points="115,355 168,350 221,340 274,310 327,260 380,180 433,120 486,130 539,200 592,290 645,340 698,355 698,365 115,365"
    fill="#ef4444" opacity="0.12"/>
  <polyline points="115,355 168,350 221,340 274,310 327,260 380,180 433,120 486,130 539,200 592,290 645,340 698,355"
    fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Peak labels -->
  <!-- Winter/Heating peak -->
  <rect x="80" y="198" width="130" height="28" rx="6" fill="#3b82f6"/>
  <text x="145" y="216" fill="white" font-size="11" font-weight="700" text-anchor="middle">❄️ Heating Peak</text>

  <!-- Summer/Cooling peak -->
  <rect x="388" y="92" width="130" height="28" rx="6" fill="#ef4444"/>
  <text x="453" y="110" fill="white" font-size="11" font-weight="700" text-anchor="middle">🔥 Cooling Peak</text>

  <!-- Key keywords annotations -->
  <!-- Winter keywords -->
  <rect x="80" y="105" width="155" height="76" rx="8" fill="#f0f7ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="90" y="122" fill="#3b82f6" font-size="10" font-weight="700">Top Winter Keywords:</text>
  <text x="90" y="138" fill="#25274d" font-size="9">furnace repair near me</text>
  <text x="90" y="152" fill="#25274d" font-size="9">heating not working</text>
  <text x="90" y="166" fill="#25274d" font-size="9">no heat emergency</text>
  <text x="90" y="180" fill="#6b7280" font-size="8">Avg job: $300-$1,200</text>

  <!-- Summer keywords -->
  <rect x="540" y="105" width="170" height="76" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="550" y="122" fill="#ef4444" font-size="10" font-weight="700">Top Summer Keywords:</text>
  <text x="550" y="138" fill="#25274d" font-size="9">ac repair near me (201K/mo)</text>
  <text x="550" y="152" fill="#25274d" font-size="9">ac not cooling</text>
  <text x="550" y="166" fill="#25274d" font-size="9">emergency ac repair</text>
  <text x="550" y="180" fill="#6b7280" font-size="8">Avg job: $200-$800</text>

  <!-- Shoulder season annotation -->
  <rect x="250" y="270" width="180" height="42" rx="8" fill="#fef3e8" stroke="#ed7c21" stroke-width="1"/>
  <text x="340" y="288" fill="#ed7c21" font-size="10" font-weight="700" text-anchor="middle">Spring/Fall = Maintenance</text>
  <text x="340" y="302" fill="#6b7280" font-size="9" text-anchor="middle">AC tune-up, furnace maintenance</text>

  <!-- Legend -->
  <rect x="260" y="400" width="280" height="36" rx="8" fill="#f9fafb"/>
  <line x1="280" y1="418" x2="304" y2="418" stroke="#ef4444" stroke-width="3"/>
  <text x="312" y="422" fill="#25274d" font-size="11" font-weight="600">Cooling/AC</text>
  <line x1="400" y1="418" x2="424" y2="418" stroke="#3b82f6" stroke-width="3"/>
  <text x="432" y="422" fill="#25274d" font-size="11" font-weight="600">Heating/Furnace</text>

  <text x="770" y="468" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
</svg>