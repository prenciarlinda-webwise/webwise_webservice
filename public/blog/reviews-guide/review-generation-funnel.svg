  <text x="400" y="404" fill="#b45309" font-size="11" text-anchor="middle">Never incentivize reviews (violates Google policy). Just make leaving one effortless.</text>

  <text x="770" y="448" fill="#25274d" font-size="9" font-weight="600" text-anchor="end" opacity="0.5">websiteandseoagency.com</text>
